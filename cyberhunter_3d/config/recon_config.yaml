# Configuration for reconnaissance tools and settings
# ---------------------------------------------------

# Tool paths can be absolute or just the command name if it's in the system's PATH.
# The application will use `shutil.which()` to find the tool.
tools:
  # Passive Reconnaissance Tools
  amass: amass
  assetfinder: assetfinder
  subfinder: subfinder

  # Active Reconnaissance & Vulnerability Scanning
  naabu: naabu
  nmap: nmap
  httpx: httpx
  nuclei: nuclei

  # Cloud & Storage Scanning
  s3scanner: s3scanner
  goblob: goblob

  # JavaScript Analysis
  linkfinder: linkfinder

  # Visual Reconnaissance
  gowitness: gowitness
  aquatone: aquatone

# Settings for various modules
settings:
  # Passive Engine Settings
  passive_engine:
    # List of commands to run for passive subdomain enumeration.
    # Use {domain} as a placeholder for the target domain.
    # Use {output_file} for tools that write to a file.
    commands:
      - [amass, enum, -passive, -d, '{domain}', -o, '{output_file}']
      - [assetfinder, --subs-only, '{domain}']
      - [subfinder, -d, '{domain}', -o, '{output_file}']

  # Permutation Engine Settings
  permutation_engine:
    wordlist: /path/to/your/dns_wordlist.txt # Recommended: dns-Jhaddix.txt
    threads: 20

  # Active Engine Settings (for services like HTTP, etc.)
  active_engine:
    ports: "80,443,8080,8443" # Default ports to scan with naabu/nmap

  # Nuclei Settings
  nuclei:
    # Templates to use for scanning. Can be paths or keywords.
    # See Nuclei documentation for more info.
    templates:
      - "technologies"
      - "cves"
      - "default-logins"
      - "exposed-panels"
    # Severity level to report (info, low, medium, high, critical)
    severity: "medium,high,critical"

  # Reporting settings
  reporting:
    output_directory: "scan_reports"
    formats: ["json", "html"] # Supported formats

  # Dorking settings
  dorking:
    github:
      # List of dorks to run. {domain} is the placeholder.
      dorks:
        - '"example.com" password'
        - '"example.com" api_key'
        - '"example.com" secret'
