# Configuration for reconnaissance tools and settings
# ---------------------------------------------------

# Tool paths can be absolute or just the command name if it's in the system's PATH.
# The application will use `shutil.which()` to find the tool.
tools:
  # Passive Reconnaissance Tools
  amass:
    cmd: "amass enum -passive -d {domain}"
  assetfinder:
    cmd: "assetfinder --subs-only {domain}"
  subfinder:
    cmd: "subfinder -d {domain}"
  hakrawler:
    cmd: "hakrawler -url {domain} -depth 2 -plain"

  # Active Reconnaissance Tools
  gobuster:
    cmd: "gobuster dns -d {domain} -w {wordlist} -q"
  puredns:
    cmd: "puredns bruteforce {wordlist} {domain} -r {resolvers}"
  nmap-axfr:
    cmd: "nmap --script dns-zone-transfer -p 53 {domain}"

  # Vulnerability Scanning
  naabu: naabu
  nmap: nmap
  httpx: httpx
  nuclei: nuclei

  # Cloud & Storage Scanning
  s3scanner: s3scanner
  goblob: goblob

  # JavaScript Analysis
  linkfinder: linkfinder

  # Visual Reconnaissance
  gowitness: gowitness
  aquatone: aquatone

# Settings for various modules
settings:
  # Passive Engine Settings
  passive_engine:
    # List of tools to run for passive subdomain enumeration.
    # The keys should match the tool names in the 'tools' section.
    tools:
      - name: "amass"
      - name: "assetfinder"
      - name: "subfinder"
      - name: "hakrawler"

  # Active Engine Settings
  active_engine:
    wordlist: "/usr/share/seclists/Discovery/DNS/dns-Jhaddix.txt"
    resolvers: "/usr/share/seclists/Discovery/DNS/resolvers.txt"
    tools:
      - name: "gobuster"
      - name: "puredns"
      - name: "nmap-axfr"

  # Permutation Engine Settings
  permutation_engine:
    wordlist: /path/to/your/dns_wordlist.txt # Recommended: dns-Jhaddix.txt
    threads: 20

  # Nuclei Settings
  nuclei:
    # Templates to use for scanning. Can be paths or keywords.
    # See Nuclei documentation for more info.
    templates:
      - "technologies"
      - "cves"
      - "default-logins"
      - "exposed-panels"
    # Severity level to report (info, low, medium, high, critical)
    severity: "medium,high,critical"

  # Reporting settings
  reporting:
    output_directory: "scan_reports"
    formats: ["json", "html"] # Supported formats

  # Dorking settings
  dorking:
    github:
      # List of dorks to run. {domain} is the placeholder.
      dorks:
        - '"example.com" password'
        - '"example.com" api_key'
        - '"example.com" secret'
