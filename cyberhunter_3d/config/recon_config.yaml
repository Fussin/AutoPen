# Configuration for the V3 Reconnaissance Phase

# Paths to tools
# Tools are expected to be in the system's PATH.
tools:
  gobuster: gobuster
  massdns: massdns
  puredns: puredns
  dnsgen: dnsgen
  gotator: gotator
  linkfinder: linkfinder
  gowitness: gowitness
  aquatone: aquatone
  wappalyzer: wappalyzer
  naabu: naabu
  nmap: nmap
  httpx: httpx
  subfinder: subfinder
  amass: amass
  assetfinder: assetfinder
  waybackurls: waybackurls
  katana: katana
  subzy: subzy
  nuclei: nuclei
  dnsx: dnsx
  gospider: gospider
  gau: gau
  sublist3r: sublist3r
  gh_dork: gh-dork.py # Assumes gh-dork repo is cloned and script is in PATH
  s3scanner: s3scanner

# Paths to wordlists
# These paths need to be updated for the Docker container.
# I will handle this in the Dockerfile by placing the wordlists in a known location.
wordlists:
  dns_bruteforce: /wordlists/subdomains-top1million-5000.txt
  dir_bruteforce: /wordlists/directory-list-2.3-medium.txt
  resolvers: /wordlists/resolvers.txt
  github_dorks: /app/gh-dork/dorks.txt

# Other settings
recon_output_dir: recon_results
screenshot_dir: screenshots
nmap_output_dir: nmap
final_recon_file: final_recon_data.json
master_subdomains_file: master_subdomains.txt

# Command templates for external tools
tool_commands:
  # Single target
  gau: "gau --subs {target}"
  waybackurls: "waybackurls {target}"
  katana: "katana -u {target} -silent"
  hakrawler: "hakrawler -url {target} -depth 2 -plain"

  # File input
  gau_file: "gau --subs --file {input_file}"
  katana_list: "katana -list {input_file} -silent"
  httpx_file: "httpx -l {input_file} -json -o {output_file} -silent -status-code -tech-detect -title -follow-redirects"
  unfurl_file: "cat {input_file} | unfurl --unique keys"
  nuclei_file: "nuclei -l {input_file} -t cves,technologies,vulnerabilities -json -o {output_file} -silent"
  gobuster: "gobuster dir -u {url} -w {wordlist} -q -o {output_file}"
  linkfinder: "linkfinder.py -i {url} -o cli"

# Plugin settings
plugins:
  enabled:
    - "Passive Enumeration"
    - "Active Enumeration"
    - "Permutation Enumeration"
    - "JS and Code Analysis"
    - "Technology Fingerprinting"
    - "Subdomain Takeover"
    - "Cloud Enumeration"
    - "CVE Mapper"
