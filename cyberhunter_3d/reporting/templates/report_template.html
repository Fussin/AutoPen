<!DOCTYPE html>
<html>
<head>
    <title>CyberHunter Scan Report</title>
    <style>
        body { font-family: sans-serif; }
        h1 { color: #333; }
        ul { list-style-type: none; padding: 0; }
        li { padding: 5px 0; }
    </style>
</head>
<body>
    <h1>CyberHunter Scan Report</h1>
    <h2>Subdomains Found:</h2>
    <ul>
        {% for subdomain in data.subdomains %}
            <li>{{ subdomain }}</li>
        {% endfor %}
    </ul>
</body>
</html>
