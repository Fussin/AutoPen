{% extends "base.html" %}
{% block content %}
<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2em;">
  <h2>3D Real-time Monitoring</h2>
  <div>
    <a href="{{ url_for('dashboard') }}" class="button">Back to Dashboard</a>
  </div>
</div>

<div id="3d-container" style="width: 100%; min-height: 80vh; background-color: #1e1e1e; border-radius: 8px; position: relative;">
  <canvas id="3d-canvas"></canvas>
</div>

<!-- Three.js Library -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
  document.addEventListener('DOMContentLoaded', function () {
    const container = document.getElementById('3d-container');
    const canvas = document.getElementById('3d-canvas');
    let scene, camera, renderer;
    let progressBars = new THREE.Group();
    let vulnerabilityFeed = new THREE.Group();
    let statsPanel = new THREE.Group();

    function init() {
      // Scene
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x1e1e1e);
      scene.fog = new THREE.Fog(0x1e1e1e, 10, 50);

      // Camera
      camera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.1, 1000);
      camera.position.z = 15;

      // Renderer
      renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
      renderer.setSize(container.clientWidth, container.clientHeight);
      container.appendChild(renderer.domElement);

      // Lights
      const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
      scene.add(ambientLight);
      const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
      directionalLight.position.set(5, 10, 7.5);
      scene.add(directionalLight);

      // Add groups to scene
      scene.add(progressBars);
      scene.add(vulnerabilityFeed);
      scene.add(statsPanel);

      // Handle window resize
      window.addEventListener('resize', onWindowResize, false);

      // Fetch data and build scene
      fetchDataAndBuildScene();

      // Start animation
      animate();
    }

    function onWindowResize() {
      camera.aspect = container.clientWidth / container.clientHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(container.clientWidth, container.clientHeight);
    }

    function animate() {
      requestAnimationFrame(animate);
      // Add animations here, e.g., rotating the groups
      progressBars.rotation.y += 0.001;
      vulnerabilityFeed.rotation.y -= 0.001;
      renderer.render(scene, camera);
    }

    function fetchDataAndBuildScene() {
      fetch('/api/v1/monitoring/status')
        .then(response => response.json())
        .then(data => {
          buildProgressBars(data.scan_progress);
          buildVulnerabilityFeed(data.vulnerability_feed);
          buildStatsPanel(data.scanner_stats);
        })
        .catch(error => console.error('Error fetching monitoring data:', error));
    }

    function createTextSprite(message, parameters) {
        const fontface = parameters.fontface || "Arial";
        const fontsize = parameters.fontsize || 18;
        const borderThickness = parameters.borderThickness || 4;
        const borderColor = parameters.borderColor || { r:0, g:0, b:0, a:1.0 };
        const backgroundColor = parameters.backgroundColor || { r:255, g:255, b:255, a:1.0 };
        const textColor = parameters.textColor || { r:0, g:0, b:0, a:1.0 };
        const padding = parameters.padding || 10;

        const canvas = document.createElement('canvas');
        const context = canvas.getContext('2d');

        context.font = "Bold " + fontsize + "px " + fontface;
        const metrics = context.measureText(message);
        const textWidth = metrics.width;

        canvas.width = textWidth + padding * 2;
        canvas.height = fontsize * 1.4 + padding * 2;

        context.font = "Bold " + fontsize + "px " + fontface; // re-apply font after resize

        context.fillStyle   = `rgba(${backgroundColor.r}, ${backgroundColor.g}, ${backgroundColor.b}, ${backgroundColor.a})`;
        context.strokeStyle = `rgba(${borderColor.r}, ${borderColor.g}, ${borderColor.b}, ${borderColor.a})`;
        context.lineWidth = borderThickness;
        roundRect(context, borderThickness/2, borderThickness/2, canvas.width - borderThickness, canvas.height - borderThickness, 6);

        context.fillStyle = `rgba(${textColor.r}, ${textColor.g}, ${textColor.b}, 1.0)`;
        context.fillText(message, padding, fontsize + padding);

        const texture = new THREE.Texture(canvas);
        texture.needsUpdate = true;
        const spriteMaterial = new THREE.SpriteMaterial({ map: texture });
        const sprite = new THREE.Sprite(spriteMaterial);
        sprite.scale.set(canvas.width/100, canvas.height/100, 1.0);
        return sprite;
    }

    function roundRect(ctx, x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.quadraticCurveTo(x + w, y, x + w, y + r);
        ctx.lineTo(x + w, y + h - r);
        ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        ctx.lineTo(x + r, y + h);
        ctx.quadraticCurveTo(x, y + h, x, y + h - r);
        ctx.lineTo(x, y + r);
        ctx.quadraticCurveTo(x, y, x + r, y);
        ctx.closePath();
        if (ctx.fillStyle !== '#000000') ctx.fill();
        if (ctx.lineWidth > 0) ctx.stroke();
    }

    function buildProgressBars(progressData) {
      progressBars.position.set(-8, 4, 0);
      progressData.forEach((item, index) => {
        const group = new THREE.Group();

        // Background bar
        const bgGeometry = new THREE.BoxGeometry(5, 0.5, 0.5);
        const bgMaterial = new THREE.MeshStandardMaterial({ color: 0x555555 });
        const bgBar = new THREE.Mesh(bgGeometry, bgMaterial);
        group.add(bgBar);

        // Progress bar
        const progress = item.progress / 100;
        const fgGeometry = new THREE.BoxGeometry(5 * progress, 0.5, 0.5);
        const fgMaterial = new THREE.MeshStandardMaterial({ color: 0x00aaff });
        const fgBar = new THREE.Mesh(fgGeometry, fgMaterial);
        fgBar.position.x = - (5 * (1 - progress) / 2);
        group.add(fgBar);

        // Text label
        const label = createTextSprite(item.name + ` (${item.progress}%)`, { fontsize: 24, textColor: { r:255, g:255, b:255, a:1.0 }, backgroundColor: { r:30, g:30, b:30, a:0.8 } });
        label.position.set(0, 0.6, 0);
        group.add(label);

        group.position.y = -index * 1.5;
        progressBars.add(group);
      });
    }

    function buildVulnerabilityFeed(feedData) {
        vulnerabilityFeed.position.set(8, 0, -5);
        const severityColors = {
            "CRITICAL": 0xff0000,
            "HIGH": 0xffa500,
            "MEDIUM": 0xffff00,
            "LOW": 0x00ff00,
        };

        feedData.forEach((item, index) => {
            const group = new THREE.Group();

            const planeGeometry = new THREE.PlaneGeometry(8, 1);
            const planeMaterial = new THREE.MeshStandardMaterial({
                color: severityColors[item.severity] || 0xcccccc,
                transparent: true,
                opacity: 0.3
            });
            const plane = new THREE.Mesh(planeGeometry, planeMaterial);
            group.add(plane);

            const text = createTextSprite(`[${item.severity}] ${item.title}`, {
                fontsize: 20,
                textColor: { r:255, g:255, b:255, a:1.0 },
                backgroundColor: { r:44, g:44, b:44, a:0.9 }
            });
            text.position.z = 0.1;
            group.add(text);

            group.position.y = -index * 1.2;
            vulnerabilityFeed.add(group);
        });
    }

    function buildStatsPanel(statsData) {
        statsPanel.position.set(0, -6, 0);
        const statsText = `Active Scanners: ${statsData.active} | Queue: ${statsData.queue} | Completed: ${statsData.completed}`;
        const text = createTextSprite(statsText, {
            fontsize: 32,
            textColor: { r:0, g:170, b:255, a:1.0 },
            backgroundColor: { r:20, g:20, b:20, a:0.8 }
        });
        statsPanel.add(text);
    }

    init();
  });
</script>
{% endblock %}
