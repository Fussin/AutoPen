<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>CyberHunter 3D Portal</title>
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: #1a1a1a; color: #e0e0e0; margin: 0; padding: 0; }
      .main-container { max-width: 1200px; margin: 2em auto; padding: 2em; background: #2c2c2c; border-radius: 8px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5); }
      .auth-container { max-width: 400px; margin: 10vh auto; }
      h1, h2 { color: #00aaff; }
      h3 { border-bottom: 2px solid #00aaff; padding-bottom: 0.3em; margin-bottom: 1em; }
      form { display: flex; flex-direction: column; }
      label { margin-bottom: 0.5em; font-weight: bold; }
      input { padding: 10px; margin-bottom: 1em; border-radius: 4px; border: 1px solid #555; background: #333; color: #fff; font-size: 1em; }
      .button { background-color: #00aaff; color: white; padding: 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 1.1em; font-weight: bold; transition: background-color 0.3s; }
      .button:hover { background-color: #0088cc; }
      .alert { padding: 1em; margin-bottom: 1em; border-radius: 4px; text-align: center; }
      .alert-danger { background-color: #721c24; color: #f8d7da; }
      .alert-success { background-color: #155724; color: #d4edda; }
      a { color: #00aaff; text-decoration: none; }
      a:hover { text-decoration: underline; }
      p { line-height: 1.6; }
      img { display: block; margin: 1em auto; }
      table { width: 100%; border-collapse: collapse; }
      th, td { text-align: left; padding: 12px; border-bottom: 1px solid #444; }
      th { background-color: #333; }
      .button-small { font-size: 0.8em; padding: 0.5em 1em; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  </head>
  <body>
    <div class="main-container">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          <div style="padding: 1em 0;">
          {% for category, message in messages %}
            <div class="alert alert-{{ category }}">{{ message }}</div>
          {% endfor %}
          </div>
        {% endif %}
      {% endwith %}
      {% block content %}{% endblock %}
    </div>
    <script>
      mermaid.initialize({ startOnLoad: true, theme: 'dark' });
    </script>
  </body>
</html>
