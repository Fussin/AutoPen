<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>CyberHunter 3D Portal</title>
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: #1a1a1a; color: #e0e0e0; margin: 0; padding: 2em; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
      .container { max-width: 400px; width: 100%; background: #2c2c2c; padding: 2em; border-radius: 8px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5); }
      h1, h2 { color: #00aaff; text-align: center; }
      form { display: flex; flex-direction: column; }
      label { margin-bottom: 0.5em; font-weight: bold; }
      input { padding: 10px; margin-bottom: 1em; border-radius: 4px; border: 1px solid #555; background: #333; color: #fff; font-size: 1em; }
      .button { background-color: #00aaff; color: white; padding: 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 1.1em; font-weight: bold; transition: background-color 0.3s; }
      .button:hover { background-color: #0088cc; }
      .alert { padding: 1em; margin-bottom: 1em; border-radius: 4px; text-align: center; }
      .alert-danger { background-color: #721c24; color: #f8d7da; }
      .alert-success { background-color: #155724; color: #d4edda; }
      a { color: #00aaff; text-decoration: none; }
      a:hover { text-decoration: underline; }
      p { text-align: center; }
      img { display: block; margin: 1em auto; }
    </style>
  </head>
  <body>
    <div class="container">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="alert alert-{{ category }}">{{ message }}</div>
          {% endfor %}
        {% endif %}
      {% endwith %}
      {% block content %}{% endblock %}
    </div>
  </body>
</html>
