{% extends "base.html" %}
{% block content %}
  <div style="display: flex; justify-content: space-between; align-items: center;">
    <h2>Your Profile</h2>
    <a href="{{ url_for('dashboard') }}" class="button">Back to Dashboard</a>
  </div>

  <hr style="border-color: #444; margin: 2em 0;">

  <h3>API Key</h3>
  <p>Use this key to authenticate with the CyberHunter 3D API.</p>

  <div style="background-color: #1a1a1a; padding: 1em; border-radius: 4px; border: 1px solid #444; margin-bottom: 1em;">
    <code id="api-key">{{ current_user.api_key }}</code>
  </div>

  <form method="post" action="{{ url_for('profile') }}">
    <button type="submit" class="button" style="background-color: #d9534f;">Regenerate API Key</button>
  </form>
  <small style="color: #bbb; display: block; margin-top: 0.5em;">
    Warning: Regenerating your API key will invalidate the old one immediately.
  </small>

{% endblock %}
