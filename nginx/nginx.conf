# Define an upstream block pointing to our 'web' service in docker-compose
upstream cyberhunter_app {
    # 'web' is the service name, resolved by Docker's internal networking
    server web:5001;
}

server {
    # Listen on port 80 for standard HTTP traffic
    listen 80;
    server_name your_domain.com localhost; # Replace with your actual domain

    # Redirect all HTTP traffic to HTTPS for security
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    # Listen on port 443 for secure HTTPS traffic
    listen 443 ssl;
    server_name your_domain.com localhost; # Replace with your actual domain

    # --- SSL Certificate Configuration ---
    # For production, replace these with your actual certificate paths.
    # The paths below are where the certificates will be inside the Nginx container.
    # ssl_certificate /etc/nginx/certs/fullchain.pem;
    # ssl_certificate_key /etc/nginx/certs/privkey.pem;

    # --- Proxy Configuration ---
    # This is the main rule. All incoming requests are passed to our Gunicorn server.
    location / {
        proxy_pass http://cyberhunter_app;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_redirect off;
    }

    # Let Nginx serve static files directly for better performance
    location /static {
        # The path inside the Nginx container where static files are mounted
        alias /var/www/static;
    }
}
