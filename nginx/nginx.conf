# Define the upstream server, which is our 'web' service in docker-compose
upstream cyberhunter_app {
    # The service name 'web' is resolved by Docker's internal DNS
    server web:5001;
}

server {
    # Listen on port 80 for standard HTTP traffic
    listen 80;
    server_name localhost your_domain.com; # Replace with your domain

    # Redirect all HTTP traffic to HTTPS for security
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    # Listen on port 443 for secure HTTPS traffic
    listen 443 ssl;
    server_name localhost your_domain.com; # Replace with your domain

    # SSL Certificate configuration (replace with your actual certificate paths)
    # These paths are relative to where you mount them in docker-compose.yml
    # ssl_certificate /etc/nginx/certs/fullchain.pem;
    # ssl_certificate_key /etc/nginx/certs/privkey.pem;

    # Security enhancements
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384:ECDHE-RSA-AES128-GCM-SHA256';
    ssl_prefer_server_ciphers off;

    # This is the main proxy rule. All incoming requests are passed to our Gunicorn server.
    location / {
        proxy_pass http://cyberhunter_app;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_redirect off;
    }

    # (Optional) Add a location block to let Nginx serve static files directly
    # This is much more efficient than using Flask for static content.
    location /static {
        alias /home/appuser/app/cyberhunter_3d/web/static;
    }
}
