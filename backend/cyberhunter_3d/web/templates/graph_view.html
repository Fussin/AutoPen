{% extends "base.html" %}
{% block content %}
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2em;">
    <h2>3D Visual Scope Graph for Scan #{{ scan.id }}</h2>
    <div>
        <a href="{{ url_for('scan_results', scan_id=scan.id) }}" class="button">Back to Results</a>
        <a href="{{ url_for('dashboard') }}" class="button">Back to Dashboard</a>
    </div>
  </div>

  <div id="3d-graph" style="width: 100%; min-height: 80vh; background-color: #000011; border-radius: 8px;"></div>

  <script src="{{ url_for('static', filename='3d-force-graph.min.js') }}"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const graphContainer = document.getElementById('3d-graph');
      const scanId = {{ scan.id }};

      fetch(`/api/v1/scans/${scanId}/graph_data`)
        .then(response => {
          if (!response.ok) {
            throw new Error('Network response was not ok');
          }
          return response.json();
        })
        .then(data => {
          const Graph = ForceGraph3D()
            (graphContainer)
            .graphData(data)
            .nodeLabel('name')
            .nodeAutoColorBy('type')
            .linkSource('source')
            .linkTarget('target')
            .onNodeHover(node => graphContainer.style.cursor = node ? 'pointer' : null)
            .onNodeClick(node => {
              if (node.type === 'vulnerability') {
                window.open(`/vulnerability/${node.id.split('_')[1]}`, '_blank');
              }
            });
        })
        .catch(error => {
          console.error('Error fetching graph data:', error);
          graphContainer.innerHTML = '<p style="color: white; text-align: center;">Error loading graph data.</p>';
        });
    });
  </script>
{% endblock %}
