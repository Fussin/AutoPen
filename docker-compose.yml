version: '3.8'

services:
  # Nginx Reverse Proxy (New Service)
  nginx:
    image: nginx:latest
    ports:
      # Expose standard web ports to the host machine
      - "80:80"
      - "443:443"
    volumes:
      # Mount our custom nginx configuration
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      # Mount the application's static files so Nginx can serve them directly
      - ./cyberhunter_3d/web/static:/var/www/static:ro
      # (Optional) Mount your SSL certificates here for production
      # - ./path/to/your/certs:/etc/nginx/certs:ro
    depends_on:
      - web
    restart: always

  # PostgreSQL Database (New Service)
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      # These MUST match the values in your .env file's DATABASE_URL
      - POSTGRES_USER=cyberhunter
      - POSTGRES_PASSWORD=your_secure_password
      - POSTGRES_DB=cyberhunter_db
    restart: always

  # Redis Message Broker
  redis:
    image: "redis:alpine"
    volumes:
      - redis_data:/data
    restart: always

  # Web Server (Flask/Gunicorn) - NO LONGER EXPOSES PORTS DIRECTLY
  web:
    build: .
    env_file:
      - .env
    depends_on:
      - redis
      - db
    restart: always
    command: >
      sh -c "flask db upgrade && python3 -m gunicorn --bind 0.0.0.0:5001 --workers 4 'run_web:create_app()'"

  # Celery Background Worker
  worker:
    build: .
    env_file:
      - .env
    depends_on:
      - redis
      - db
    restart: always
    command: >
      sh -c "sleep 10 && celery -A run_web.celery_app worker --loglevel=info"

volumes:
  postgres_data:
  redis_data:
