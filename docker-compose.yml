version: '3.8'

services:
  # Nginx acts as the gateway to the application
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - frontend
    restart: always

  # Frontend Service (React + Vite)
  frontend:
    build:
      context: ./frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    restart: always

  # Backend Service (Python/Flask API)
  backend:
    build:
      context: ./backend
    volumes:
      - ./backend/cyberhunter.db:/home/appuser/app/cyberhunter.db
    env_file:
      - ./backend/.env
    expose:
      - "5001" # Expose port only to internal network
    depends_on:
      - db
      - redis
    restart: always
    command: >
      sh -c "flask db upgrade && python3 -m gunicorn --bind 0.0.0.0:5001 --workers 4 'run_web:create_app()'"

  # Celery Worker for background tasks
  worker:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    depends_on:
      - redis
      - db
    restart: always
    command: >
      sh -c "sleep 10 && celery -A run_web.celery_app worker --loglevel=info"

  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_USER=cyberhunter
      - POSTGRES_PASSWORD=your_secure_password
      - POSTGRES_DB=cyberhunter_db
    restart: always

  # Redis for Celery message queue
  redis:
    image: "redis:alpine"
    restart: always

volumes:
  postgres_data:
