version: '3.8'

services:
  # Nginx Reverse Proxy (New Service)
  nginx:
    image: nginx:latest
    ports:
      # Expose standard web ports to the host machine
      - "80:80"
      - "443:443"
    volumes:
      # Mount our custom nginx configuration
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      # (Optional) Mount your SSL certificates
      # - ./path/to/your/certs:/etc/nginx/certs:ro
      # Mount the static files directory so Nginx can serve them
      - ./cyberhunter_3d/web/static:/home/appuser/app/cyberhunter_3d/web/static:ro
    depends_on:
      - web
    restart: always

  # PostgreSQL Database (Recommended Enhancement)
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_USER=cyberhunter
      - POSTGRES_PASSWORD=your_secure_password
      - POSTGRES_DB=cyberhunter_db
    restart: always

  # Redis Message Broker
  redis:
    image: "redis:alpine"
    volumes:
      - redis_data:/data
    restart: always

  # Web Server (Flask/Gunicorn)
  web:
    build: .
    # REMOVED: The 'ports' section is removed. Nginx now handles all external traffic.
    volumes:
      - .:/home/appuser/app
    env_file:
      - .env
    depends_on:
      - redis
      - db
    restart: always
    command: >
      sh -c "flask db upgrade && python3 -m gunicorn --bind 0.0.0.0:5001 --workers 4 'run_web:create_app()'"

  # Celery Background Worker
  worker:
    build: .
    volumes:
      - .:/home/appuser/app
    env_file:
      - .env
    depends_on:
      - redis
      - db
    restart: always
    command: >
      sh -c "sleep 10 && celery -A run_web.celery_app worker --loglevel=info"

volumes:
  postgres_data:
  redis_data:
